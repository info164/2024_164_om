<!-- https://pythonise.com/series/learning-flask/flask-message-flashing -->
<div class="wrap flash-stack">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="flash flash--{{ category if category != 'message' else 'info' }}" role="alert">
                    <span class="flash-icon" aria-hidden="true">!</span>
                    <span class="flash-text">{{ message }}</span>
                    <button type="button" class="flash__close" data-flash-dismiss aria-label="Fermer"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
</div>
